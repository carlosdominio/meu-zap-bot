<!DOCTYPE html>
<html lang="pt-br">
<!-- v1.0.7 - EMERGENCY FIX -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Zap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #d1d7db; height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; } 
        #sidebar-header { background: #f0f2f5; padding: 15px; font-weight: bold; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item.active { background: #e9edef; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; }
        #chat-header { background: #f0f2f5; padding: 15px; border-bottom: 1px solid #ddd; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .msg-recebida { align-self: flex-start; background: white; }
        .msg-enviada { align-self: flex-end; background: #d9fdd3; }
        footer { background: #f0f2f5; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; }
        button { background: #00a884; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #qr-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div id="qr-overlay">
    <h2 id="status-text">Iniciando...</h2>
    <img id="qr-img" style="width:250px; display:none; margin-top:20px;">
</div>
<div id="sidebar">
    <div id="sidebar-header">Conversas</div>
    <div id="chat-list"></div>
</div>
<div id="main-chat">
    <div id="chat-header">Selecione um cliente</div>
    <div id="messages"></div>
    <footer id="chat-footer" style="display:none;">
        <input type="text" id="msg-input" placeholder="Mensagem...">
        <button onclick="enviar()">Enviar</button>
    </footer>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentJid = null;
    let chatData = {};

    socket.on('status', (data) => {
        document.getElementById('status-text').innerText = data.status;
        document.getElementById('qr-overlay').style.display = data.status === 'CONECTADO' ? 'none' : 'flex';
    });
    socket.on('qr', (url) => {
        const img = document.getElementById('qr-img');
        img.src = url;
        img.style.display = 'block';
    });
    socket.on('history', (history) => {
        chatData = history || {};
        updateChatList();
    });
    socket.on('new_msg', (msg) => {
        const jid = msg.sender;
        if (!chatData[jid]) chatData[jid] = { name: jid.split('@')[0], messages: [] };
        if (!chatData[jid].messages.some(m => m.id === msg.id)) {
            chatData[jid].messages.push(msg);
            if (jid === currentJid) renderMessage(msg);
        }
        updateChatList();
    });

    function updateChatList() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        Object.keys(chatData).forEach(jid => {
            const div = document.createElement('div');
            div.className = 'chat-item' + (jid === currentJid ? ' active' : '');
            div.innerHTML = '<strong>' + (chatData[jid].name || jid.split('@')[0]) + '</strong>';
            div.onclick = () => openChat(jid);
            list.appendChild(div);
        });
    }

    function openChat(jid) {
        currentJid = jid;
        document.getElementById('chat-footer').style.display = 'flex';
        document.getElementById('chat-header').innerText = chatData[jid].name || jid;
        const msgsDiv = document.getElementById('messages');
        msgsDiv.innerHTML = '';
        (chatData[jid].messages || []).forEach(renderMessage);
        updateChatList();
    }

    function renderMessage(msg) {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.fromMe ? 'msg-enviada' : 'msg-recebida');
        div.innerHTML = '<span>' + msg.text + '</span>';
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        socket.emit('send_msg', { number: currentJid, text: input.value });
        input.value = '';
    }
</script>
</body>
</html>
