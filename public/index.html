<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Zap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #d1d7db; height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; } 
        #sidebar-header { background: #f0f2f5; padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chat-item.active { background: #ebebeb; }
        .chat-info { flex: 1; overflow: hidden; }
        .btn-del-chat { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px; padding: 5px; opacity: 0.7; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; position: relative; }
        #chat-header { background: #f0f2f5; padding: 10px 20px; border-bottom: 1px solid #ddd; height: 60px; display: flex; align-items: center; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 8px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-recebida { align-self: flex-start; background: white; }
        .msg-enviada { align-self: flex-end; background: #d9fdd3; }
        footer { background: #f0f2f5; padding: 10px 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; outline: none; }
        .btn-action { background: #00a884; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #qr-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="qr-overlay" style="display: flex;">
    <h2 id="status-text">Iniciando...</h2>
    <img id="qr-img" src="" alt="QR Code" style="width: 250px; margin: 20px; display: none;">
</div>
<div id="sidebar">
    <div id="sidebar-header">Conversas</div>
    <div id="chat-list"></div>
</div>
<div id="main-chat">
    <div id="chat-header"><span id="current-chat-name">Selecione uma conversa</span></div>
    <div id="messages"></div>
    <footer id="chat-footer" style="display: none;">
        <input type="text" id="msg-input" placeholder="Digite uma mensagem...">
        <button class="btn-action" onclick="enviar()">></button>
    </footer>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentJid = null;
    let chatData = {};

    socket.on('status', (data) => {
        document.getElementById('status-text').innerText = data.status;
        document.getElementById('qr-overlay').style.display = (data.status === 'CONECTADO') ? 'none' : 'flex';
    });
    socket.on('qr', (url) => { const img = document.getElementById('qr-img'); img.src = url; img.style.display = 'block'; });
    socket.on('history', (history) => { chatData = history || {}; updateChatList(); });

    socket.on('new_msg', (msg) => {
        const jid = msg.sender;
        if (!chatData[jid]) chatData[jid] = { name: jid.split('@')[0], messages: [] };
        if (!msg.fromMe && msg.pushName && msg.pushName !== "Voce" && msg.pushName !== "Robo") {
            chatData[jid].name = msg.pushName;
        }
        if (!chatData[jid].messages.some(m => m.id === msg.id)) {
            chatData[jid].messages.push(msg);
            if (jid === currentJid) renderMessage(msg);
        }
        updateChatList();
    });

    socket.on('chat_deleted', (jid) => { 
        delete chatData[jid]; 
        if(currentJid === jid) { 
            currentJid = null; 
            document.getElementById('messages').innerHTML = ''; 
            document.getElementById('chat-footer').style.display = 'none'; 
            document.getElementById('current-chat-name').innerText = 'Selecione uma conversa';
        } 
        updateChatList(); 
    });

    function updateChatList() {
        const listDiv = document.getElementById('chat-list');
        listDiv.innerHTML = '';
        Object.keys(chatData).forEach(jid => {
            const chat = chatData[jid];
            const item = document.createElement('div');
            item.className = 'chat-item' + (jid === currentJid ? ' active' : '');
            item.onclick = () => openChat(jid); // Clique direto no item
            item.innerHTML = `
                <div class="chat-info">
                    <strong>${chat.name || jid.split('@')[0]}</strong><br>
                    <small style="color: #666;">Chat Ativo</small>
                </div>
                <button class="btn-del-chat" onclick="apagarConversa(event, '${jid}')">X</button>
            `;
            listDiv.appendChild(item);
        });
    }

    function openChat(jid) {
        currentJid = jid;
        document.getElementById('chat-footer').style.display = 'flex';
        document.getElementById('current-chat-name').innerText = chatData[jid].name || jid.split('@')[0];
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        if (chatData[jid].messages) {
            chatData[jid].messages.forEach(renderMessage);
        }
        updateChatList();
    }

    function renderMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.id = 'msg-' + msg.id;
        div.className = 'msg ' + (msg.fromMe ? 'msg-enviada' : 'msg-recebida');
        div.innerHTML = '<span>' + msg.text + '</span><br><small style="font-size: 10px; color: #999;">' + msg.time + '</small>';
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function apagarConversa(event, jid) {
        event.stopPropagation();
        if (confirm('Apagar conversa?')) socket.emit('delete_chat', jid);
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !currentJid) return;
        socket.emit('send_msg', { number: currentJid, text: input.value });
        input.value = '';
    }
</script>
</body>
</html>
