<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Zap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #d1d7db; height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #sidebar-header { background: #f0f2f5; padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .chat-item.active { background: #ebebeb !important; }
        .chat-item.unread { background: #e6fffa; border-left: 4px solid #38b2ac; }
        .chat-info { flex: 1; overflow: hidden; min-width: 0; max-width: 250px; }
        .chat-info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .badge-msg { background: #00a884; color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-left: 5px; }
        .badge-unread { background: #e74c3c;   }
        @keyframes pulse-unread { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .btn-del-chat { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px; padding: 5px; opacity: 0.7; transition: transform 0.2s; }
        .btn-del-chat:hover { transform: scale(1.2); opacity: 1; }
        #main-chat { flex: 1; min-height: 0; display: flex; flex-direction: column; background: #efeae2; position: relative; }
        #chat-header { background: #f0f2f5; padding: 10px 20px; border-bottom: 1px solid #ddd; height: 60px; display: flex; align-items: center; font-weight: bold; }
        #messages { flex: 1; min-height: 0; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 8px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-recebida { align-self: flex-start; background: white; }
        .msg-enviada { align-self: flex-end; background: #d9fdd3; }
        .audio-msg { min-width: 200px; }
        footer { background: #f0f2f5; padding: 10px 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; outline: none; font-size: 1.1rem; }
        .btn-action { background: #00a884; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #btn-record { background: #7f8c8d; }
        #btn-record.recording { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #qr-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00a884; }
        input:checked + .slider:before { transform: translateX(20px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
        .modal-text { font-size: 1rem; color: #666; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-modal { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 100px; }
        .btn-cancel { background: #f0f2f5; color: #333; }
        .btn-cancel:hover { background: #e2e5e9; }
        .btn-confirm-del { background: #ff4d4d; color: white; }
        .btn-confirm-del:hover { background: #e60000; }
        #image-viewer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; cursor: pointer; }
        #image-viewer-img { max-width: 90vw; max-height: 90vh; width: auto; height: auto; object-fit: contain; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); cursor: default; }
        #image-viewer-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #image-viewer-close:hover { color: #ccc; }
    </style>
</head>
<body>
<div id="image-viewer-overlay" onclick="fecharImagem()">
    <span id="image-viewer-close" onclick="fecharImagem()">&times;</span>
    <button id="image-viewer-delete" onclick="deletarImagemAtual(event)" style="position: fixed; bottom: 40px; right: 40px; background: #ff4d4d; color: white; border: 2px solid white; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); z-index: 2100; display: none;">🗑️ Apagar Foto</button>
    <img class="modal-content" id="image-viewer-img" onclick="event.stopPropagation()">
</div>
<div id="modal-confirm" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">Apagar Conversa?</div>
        <div class="modal-text">Deseja realmente apagar esta conversa permanentemente? Esta ação não pode ser desfeita.</div>
        <div class="modal-buttons">
            <button class="btn-modal btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-modal btn-confirm-del" id="btn-modal-confirm">Apagar</button>
        </div>
    </div>
</div>
<div id="qr-overlay" style="display: flex;">
    <h2 id="status-text">Iniciando...</h2>
    <img id="qr-img" src="" alt="QR Code" style="width: 250px; margin: 20px; display: none;">
</div>
<div id="sidebar">
    <div id="sidebar-header">Conversas</div>
    <div id="chat-list"></div>
</div>
<div id="main-chat">
    <div id="chat-header">
        <span id="current-chat-name" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Selecione uma conversa</span>
        <div id="human-control-toggle" style="display: none; align-items: center; gap: 8px;">
            <span id="status-label" style="font-size: 12px; color: #666;">Robô Ativo</span>
            <label class="switch">
                <input type="checkbox" id="human-toggle-input" onchange="toggleHumanControl(this.checked)">
                <span class="slider round"></span>
            </label>
        </div>
    </div>
    <div id="messages"></div>
    <footer id="chat-footer" style="display: none;">
        <button id="btn-image" class="btn-action" onclick="document.getElementById('image-upload').click()" style="background: #3498db; margin-right: 5px;">🖼️</button>
        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="enviarImagem(this)">
        <button id="btn-record" class="btn-action" onclick="toggleRecording()">🎙️</button>
        <input type="text" id="msg-input" placeholder="Digite uma mensagem..." onkeyup="handleKeyUp(event)">
        <button class="btn-action" onclick="enviar()">></button>
    </footer>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentJid = null;
    let chatData = {};
    let mediaRecorder;
    let audioChunks = [];
    socket.on('status', (data) => {
        document.getElementById('status-text').innerText = data.status;
        document.getElementById('qr-overlay').style.display = (data.status === 'CONECTADO') ? 'none' : 'flex';
    });
    socket.on('qr', (url) => { const img = document.getElementById('qr-img'); img.src = url; img.style.display = 'block'; document.getElementById('qr-overlay').style.display = 'flex'; });
    socket.on('history', (history) => { chatData = history || {}; updateChatList(); setInterval(updateUnreadTitle, 5000); });
    socket.on('new_msg', (msg) => {
        const jid = msg.sender;
        if (!chatData[jid]) chatData[jid] = { name: jid.split('@')[0], messages: [], unreadCount: 0, lastUpdate: Date.now() };
        if (!msg.fromMe && msg.pushName && msg.pushName !== 'Voce' && msg.pushName !== 'Robo') { chatData[jid].name = msg.pushName; }
        if (!chatData[jid].messages.some(m => m.id === msg.id)) {
            chatData[jid].messages.push(msg);
            chatData[jid].lastUpdate = Date.now();
            if (jid !== currentJid && (!msg.fromMe || chatData[jid].name === 'Pedidos Zap 📦')) { chatData[jid].unreadCount = (chatData[jid].unreadCount || 0) + 1; }
            window.parent.postMessage({ type: 'whatsapp_new_activity', jid: jid, active: (jid === currentJid), fromMe: msg.fromMe }, '*');
            if (jid === currentJid) renderMessage(msg);
        }
        updateChatList();
    });
    socket.on('chat_deleted', (jid) => {
        delete chatData[jid];
        if(currentJid === jid) {
            currentJid = null;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chat-footer').style.display = 'none';
            document.getElementById('human-control-toggle').style.display = 'none';
            document.getElementById('current-chat-name').innerText = 'Selecione uma conversa';
        }
        updateChatList();
    });
    socket.on('status_atendimento', (data) => {
        if (chatData[data.jid]) {
            chatData[data.jid].atendimentoManual = data.atendimentoManual;
            if (data.jid === currentJid) {
                const input = document.getElementById('human-toggle-input');
                input.checked = data.atendimentoManual;
                document.getElementById('status-label').innerText = data.atendimentoManual ? 'Humano Ativo' : 'Robô Ativo';
            }
            updateChatList();
        }
    });
    function updateUnreadTitle() {
        const totalUnread = Object.values(chatData).reduce((sum, chat) => sum + (chat.unreadCount || 0), 0);
        if (totalUnread > 0) {
            document.title = '(' + totalUnread + ') Painel Zap';
            window.parent.postMessage({ type: 'whatsapp_unread', count: totalUnread }, '*');
        } else {
            document.title = 'Painel Zap';
            window.parent.postMessage({ type: 'whatsapp_unread', count: 0 }, '*');
        }
    }
    function updateChatList() {
        const listDiv = document.getElementById('chat-list');
        listDiv.innerHTML = '';
        const sortedJids = Object.keys(chatData).sort((a, b) => (chatData[b].lastUpdate || 0) - (chatData[a].lastUpdate || 0));
        sortedJids.forEach(jid => {
            const chat = chatData[jid];
            const item = document.createElement('div');
            const isUnread = chat.unreadCount > 0;
            item.className = 'chat-item' + (jid === currentJid ? ' active' : '') + (isUnread ? ' unread' : '');
            item.onclick = () => openChat(jid);
            const statusIcon = chat.atendimentoManual ? '👤' : '🤖';
            item.innerHTML = '<div class="chat-info"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;"><strong>' + (chat.name || jid.split('@')[0]) + ' ' + statusIcon + '</strong>' + (isUnread ? '<span class="badge-msg badge-unread">' + chat.unreadCount + '</span>' : '') + '</div><div style="display: flex; justify-content: space-between; align-items: center;"><small style="color: #666;">' + (chat.messages ? chat.messages.length : 0) + ' msgs</small><small style="font-size: 10px; color: #999;">' + new Date(chat.lastUpdate).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) + '</small></div></div><button class="btn-del-chat" onclick="apagarConversa(event, \'' + jid + '\')" title="Apagar conversa">🗑️</button>';
            listDiv.appendChild(item);
        });
    }
    function openChat(jid) {
        currentJid = jid;
        if (chatData[jid]) { chatData[jid].unreadCount = 0; socket.emit('mark_seen', jid); }
        document.getElementById('chat-footer').style.display = 'flex';
        document.getElementById('human-control-toggle').style.display = 'flex';
        document.getElementById('current-chat-name').innerText = chatData[jid].name || jid.split('@')[0];
        const isManual = chatData[jid].atendimentoManual || false;
        document.getElementById('human-toggle-input').checked = isManual;
        document.getElementById('status-label').innerText = isManual ? 'Humano Ativo' : 'Robô Ativo';
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        if (chatData[jid].messages) {
            const uniqueMsgs = [];
            const ids = new Set();
            chatData[jid].messages.forEach(m => { if (!ids.has(m.id)) { ids.add(m.id); uniqueMsgs.push(m); } });
            uniqueMsgs.forEach(renderMessage);
        }
        updateChatList();
        scrollToBottom();
    }
    function renderMessage(msg) {
        if (document.getElementById('msg-' + msg.id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + msg.id;
        div.className = 'msg ' + (msg.fromMe ? 'msg-enviada' : 'msg-recebida');
        let msgContent = '';
        if (msg.text) msgContent += '<p>' + msg.text + '</p>';
        if (msg.audioUrl) msgContent += '<audio controls class="audio-msg"><source src="' + msg.audioUrl + '" type="audio/ogg"></audio>';
        if (msg.imageUrl) msgContent += '<br><img src="' + msg.imageUrl + '" onclick="abrirImagem(this.src, \'' + msg.id + '\', ' + (msg.fromMe ? 'true' : 'false') + ')" style="max-width: 250px; border-radius: 8px; margin-top: 5px; cursor: pointer;" title="Clique para ampliar">';
        div.innerHTML = msgContent + '<small style="display:block; text-align:right; font-size:10px; margin-top:5px; opacity:0.6;">' + msg.time + '</small>';
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
    }
    function scrollToBottom() { const msgDiv = document.getElementById('messages'); msgDiv.scrollTop = msgDiv.scrollHeight; }
    function handleKeyUp(e) { if (e.key === 'Enter') enviar(); }
    function toggleHumanControl(checked) { if (!currentJid) return; socket.emit('toggle_atendimento', { jid: currentJid, status: checked }); }
    let jidToDelete = null;
    function openConfirmModal(jid) {
        jidToDelete = jid;
        document.getElementById('modal-confirm').style.display = 'flex';
        document.getElementById('btn-modal-confirm').onclick = () => { if (jidToDelete) { socket.emit('delete_chat', jidToDelete); closeModal(); } };
    }
    function closeModal() { document.getElementById('modal-confirm').style.display = 'none'; jidToDelete = null; }
    function apagarConversa(e, jid) { e.stopPropagation(); openConfirmModal(jid); }
    function enviar() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !currentJid) return;
        socket.emit('send_msg', { number: currentJid, text: input.value });
        input.value = '';
    }
    async function toggleRecording() {
        const btn = document.getElementById('btn-record');
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => { socket.emit('send_audio', { number: currentJid, audio: reader.result }); };
            };
            mediaRecorder.start();
            btn.classList.add('recording');
            btn.innerText = '⏹️';
        } else {
            mediaRecorder.stop();
            btn.classList.remove('recording');
            btn.innerText = '🎙️';
        }
    }
    function enviarImagem(input) {
        if (input.files && input.files[0] && currentJid) {
            const reader = new FileReader();
            reader.onload = (e) => { socket.emit('send_image', { number: currentJid, image: e.target.result }); };
            reader.readAsDataURL(input.files[0]);
            input.value = '';
        }
    }
    let currentViewerMsgId = null;
    let currentViewerFromMe = null;
    function abrirImagem(url, msgId, fromMe) {
        const img = document.getElementById('image-viewer-img');
        const overlay = document.getElementById('image-viewer-overlay');
        const btnDelete = document.getElementById('image-viewer-delete');
        img.src = url;
        overlay.style.display = 'flex';
        currentViewerMsgId = msgId;
        currentViewerFromMe = fromMe;
        if (msgId && btnDelete) { btnDelete.style.display = 'block'; } else { if (btnDelete) btnDelete.style.display = 'none'; }
    }
    function fecharImagem() {
        document.getElementById('image-viewer-overlay').style.display = 'none';
        document.getElementById('image-viewer-img').src = '';
        currentViewerMsgId = null;
    }
    function deletarImagemAtual(event) {
        event.stopPropagation();
        if (currentViewerMsgId && currentJid) {
            if (confirm('Deseja realmente APAGAR esta imagem para você e para o cliente?')) {
                socket.emit('delete_msg', { jid: currentJid, id: currentViewerMsgId, fromMe: currentViewerFromMe });
                const msgEl = document.getElementById('msg-' + currentViewerMsgId);
                if (msgEl) msgEl.remove();
                fecharImagem();
            }
        }
    }
</script>
</body>
</html>
